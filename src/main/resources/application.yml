# ===================================================================
# Server specific properties
# ===================================================================
server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: appointment-api
  web:
    resources:
      static-locations: classpath:/static/
      cache:
        period: 3600

  jackson:
    deserialization:
      fail-on-unknown-properties: true
    serialization:
      fail-on-empty-beans: false
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      pool-name: Hikari
      auto-commit: false
      maximum-pool-size: ${DB_MAX_POOL_SIZE:20}
      data-source-properties:
        useServerPrepStmts: true
        cachePrepStmts: true
        rewriteBatchedStatements: true
    url: ${DB_URL:jdbc:mysql://localhost:3306/appointment?allowPublicKeyRetrieval=true&useUnicode=yes&characterEncoding=UTF-8&characterSetResults=UTF-8&useSSL=false&createDatabaseIfNotExist=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  main:
    allow-bean-definition-overriding: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db-changelog-master.xml
    contexts: dev

  jpa:
    show-sql: false
    open-in-view: false
    properties:
      dialect: org.hibernate.dialect.MySQL8Dialect
      hibernate.jdbc.time_zone: UTC
      hibernate.id.new_generator_mappings: true
      hibernate.connection.provider_disables_autocommit: true
      hibernate.connection.autocommit: false
      hibernate.cache.use_query_cache: false
      hibernate.generate_statistics: false
      # modify batch size as necessary
      hibernate.jdbc.batch_size: 1000
      hibernate.order_inserts: true
      hibernate.order_updates: true
      hibernate.query.fail_on_pagination_over_collection_fetch: true
      hibernate.query.in_clause_parameter_padding: true
      hibernate.show_sql: false
      hibernate.format_sql: true
      hibernate.cache.use_second_level_cache: false
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        implicit-strategy: org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy

  task:
    execution:
      pool:
        core-size: ${ASYNC_CORE_SIZE:2}
        max-size: ${ASYNC_MAX_SIZE:10}
        queue-capacity: ${ASYNC_QUEUE_CAPACITY:100}
        keep-alive: ${ASYNC_KEEP_ALIVE:60s}
        thread-name-prefix: ${ASYNC_THREAD_PREFIX:Async-}

logging:
  level:
    com.appointment: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{traceId}] %logger{36} - %msg%n"

#Custom application properties
application:
  security:
    jwt:
      secret: ${JWT_SECRET:8Yo6/CH3XjqqjKdtEwDrMAERWknrLTD7O4ZXeg==tKjz+JSPyVCz9BtBGj59TRZy}
      token-expiration-in-millis: ${JWT_TOKEN_EXPIRATION_IN_MILLIS:18000000}
      renew-token-expiration-in-millis: ${JWT_RENEW-TOKEN_EXPIRATION_IN_MILLIS:30000000}
    cors:
      allowed-origins: ${CORS_ALLOW_ORIGINS:http://localhost:3000}
      allowed-methods: ${CORS_ALLOW_METHODS:*}
      allowed-headers: ${CORS_ALLOW_HEADERS:*}
      exposed-headers: ${CORS_EXPOSED_HEADERS:*}
      allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
    # Password Policy Configuration
    password:
      admin-expiry-days: ${PASSWORD_ADMIN_EXPIRY_DAYS:90}
      user-expiry-days: ${PASSWORD_USER_EXPIRY_DAYS:180}
      history-limit: ${PASSWORD_HISTORY_LIMIT:5}
      min-length: ${PASSWORD_MIN_LENGTH:8}
      max-length: ${PASSWORD_MAX_LENGTH:128}
    # Login Security Configuration
    login:
      max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
      lockout-minutes: ${LOGIN_LOCKOUT_MINUTES:30}
    # Session Management Configuration
    session:
      timeout-minutes: ${SESSION_TIMEOUT_MINUTES:60}
      renewal-minutes: ${SESSION_RENEWAL_MINUTES:60}
      max-concurrent-sessions: ${SESSION_MAX_CONCURRENT:3}
  cookie:
    attributes:
      same-site: ${COOKIE_SAME_SITE:Lax}
      max-age: ${COOKIE_MAX_AGE:true}
      path: ${COOKIE_PATH:/}
      http-only: ${COOKIE_HTTP_ONLY:true}
      secure: ${COOKIE_SECURE:false}
    domains: ${COOKIE_DOMAINS:}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    disable-swagger-default-url: true
    path: /swagger
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  show-actuator: false
  use-management-port: false
